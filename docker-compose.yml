# Full-Stack Docker Development (Alternative)
# Use this when you don't have PHP installed locally
# Backend and Frontend both run in Docker containers
# Run with: docker compose up -d
# Note: Uses npm in containers for Docker compatibility

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: expense_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=expense_db
      - POSTGRES_USER=expense_user
      - POSTGRES_PASSWORD=expense_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U expense_user -d expense_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "postgres", "-c", "shared_buffers=1GB", "-c", "effective_cache_size=3GB", "-c", "work_mem=16MB", "-c", "maintenance_work_mem=256MB" ]

  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: expense_pgbouncer
    environment:
      - DB_USER=expense_user
      - DB_PASSWORD=expense_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=expense_db
      - POOL_MODE=session
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
    depends_on:
      - postgres
    networks:
      - expense_network
    restart: unless-stopped

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      # SQLite Configuration (Default)
      # - DB_CONNECTION=sqlite
      # - DB_DATABASE=/var/www/html/database/database.sqlite
      # PostgreSQL Configuration (Uncomment to switch)
      - DB_CONNECTION=pgsql
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=expense_password
      - QUEUE_CONNECTION=database
      - SESSION_EXPIRE_ON_CLOSE=true
      - SESSION_LIFETIME=60
    depends_on:
      - queue
      - pgbouncer
      - postgres
    networks:
      - expense_network
    command: sh -c "DB_HOST=postgres DB_PORT=5432 php artisan migrate --force && rm -rf public/storage && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=8000"

  # Laravel Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_queue
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=local
      # SQLite Configuration (Default)
      # - DB_CONNECTION=sqlite
      # - DB_DATABASE=/var/www/html/database/database.sqlite
      # PostgreSQL Configuration (Uncomment to switch)
      - DB_CONNECTION=pgsql
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=expense_password
      - QUEUE_CONNECTION=database
    depends_on:
      - pgbouncer
      - postgres
    restart: always
    networks:
      - expense_network
    command: php artisan queue:work --tries=1

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
    networks:
      - expense_network
    command: npm run dev -- --host 0.0.0.0

networks:
  expense_network:
    driver: bridge

volumes:
  postgres_data:
