# Development Docker Compose Configuration
# Backend and Queue only - Frontend runs locally with npm run dev
# Run with: docker-compose -f docker-compose.dev.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: expense_postgres_dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=expense_db
      - POSTGRES_USER=expense_user
      - POSTGRES_PASSWORD=expense_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - expense_dev_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U expense_user -d expense_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_backend_dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://127.0.0.1:8000
      # SQLite Configuration (Disabled for PostgreSQL migration)
      # - DB_CONNECTION=sqlite
      # - DB_DATABASE=/var/www/html/database/database.sqlite
      # PostgreSQL Configuration (Active)
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=expense_password
      - QUEUE_CONNECTION=database
      - SESSION_EXPIRE_ON_CLOSE=true
      - SESSION_LIFETIME=60
      - FRONTEND_URL=http://localhost:5173
      - ALT_FRONTEND_URL=http://127.0.0.1:5173
    depends_on:
      - queue
      - postgres
    networks:
      - expense_dev_network
    command: sh -c "php artisan migrate --force && rm -rf public/storage && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=8000"

  # Laravel Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_queue_dev
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=local
      # SQLite Configuration (Disabled for PostgreSQL migration)
      # - DB_CONNECTION=sqlite
      # - DB_DATABASE=/var/www/html/database/database.sqlite
      # PostgreSQL Configuration (Active)
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=expense_password
      - QUEUE_CONNECTION=database
    depends_on:
      - postgres
    restart: always
    networks:
      - expense_dev_network
    command: php artisan queue:work --tries=1

networks:
  expense_dev_network:
    driver: bridge

volumes:
  postgres_data_dev:
