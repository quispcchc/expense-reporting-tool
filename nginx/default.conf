# Nginx Configuration for Production
# Handles Frontend (proxy to React), Backend (FastCGI to PHP-FPM), and Security

upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:9000;
}

server {
    listen 80;
    server_name _; # Change this to your domain in production

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Allow larger file uploads
    client_max_body_size 50M;

    # Root directory for backend public files (must be shared via volume)
    root /var/www/html/public;
    index index.php;

    # Frontend routing
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API routing
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF cookie endpoint
    location /sanctum/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage files (uploaded files, etc.)
    location /storage/ {
        # If serving directly from volume
        # alias /var/www/html/storage/app/public/;
        # try_files $uri =404;

        # Or proxy back to backend if backend handles it
        proxy_pass http://backend/storage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Handle PHP files with FastCGI
    location ~ \.php$ {
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Increased timeouts for PDF generation
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Deny access to . files
    location ~ /\. {
        deny all;
    }
}
