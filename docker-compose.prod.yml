# Production Docker Compose Configuration
# Run with: docker-compose -f docker-compose.prod.yml up -d --build
# Configuration: copy .env.example to .env and fill in the values

# Default logging configuration for all services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: expense_postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    command: [ "postgres", "-c", "shared_buffers=1GB", "-c", "effective_cache_size=3GB", "-c", "work_mem=16MB", "-c", "maintenance_work_mem=256MB" ]

  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: expense_pgbouncer
    environment:
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - POOL_MODE=${PGBOUNCER_POOL_MODE}
      - MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN}
      - DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE}
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - expense_network
    restart: unless-stopped
    logging: *default-logging

  # Nginx Reverse Proxy (Entry Point)
  nginx:
    image: nginx:alpine
    container_name: expense_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - expense_network
    logging: *default-logging

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_backend
    expose:
      - "8000"
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - DB_CONNECTION=pgsql
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_CONNECTION=database
      - MAIL_MAILER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
      - SESSION_EXPIRE_ON_CLOSE=true
      - SESSION_LIFETIME=${SESSION_LIFETIME}
      - FRONTEND_URL=${FRONTEND_URL}
      - ALT_FRONTEND_URL=${ALT_FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      queue:
        condition: service_started
    restart: unless-stopped
    networks:
      - expense_network
    command: sh -c "DB_HOST=postgres DB_PORT=5432 php artisan migrate --force && rm -rf public/storage && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=8000"
    logging: *default-logging

  # Laravel Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_queue
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_CONNECTION=database
      - MAIL_MAILER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    restart: always
    networks:
      - expense_network
    command: php artisan queue:work --tries=1
    logging: *default-logging

  # React Frontend (Production Build served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: expense_frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - expense_network
    logging: *default-logging

networks:
  expense_network:
    driver: bridge

volumes:
  postgres_data:
