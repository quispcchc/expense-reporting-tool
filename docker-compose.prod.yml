# Production Docker Compose Configuration
# Run with: docker-compose -f docker-compose.prod.yml up -d --build

# Default logging configuration for all services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: expense_postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=expense_db
      - POSTGRES_USER=expense_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-expense_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U expense_user -d expense_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    command: [ "postgres", "-c", "shared_buffers=1GB", "-c", "effective_cache_size=3GB", "-c", "work_mem=16MB", "-c", "maintenance_work_mem=256MB" ]

  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: expense_pgbouncer
    environment:
      - DB_USER=expense_user
      - DB_PASSWORD=${POSTGRES_PASSWORD:-expense_password}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=expense_db
      - POOL_MODE=session
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
    depends_on:
      - postgres
    networks:
      - expense_network
    restart: unless-stopped
    logging: *default-logging

  # Nginx Reverse Proxy (Entry Point)
  nginx:
    image: nginx:alpine
    container_name: expense_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - expense_network
    logging: *default-logging

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_backend
    expose:
      - "8000"
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://deneb.ddns.net
      # SQLite Configuration (Default)
      # - DB_CONNECTION=sqlite
      # - DB_DATABASE=/var/www/html/database/database.sqlite
      # PostgreSQL Configuration (Uncomment to switch)
      - DB_CONNECTION=pgsql
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=${POSTGRES_PASSWORD:-expense_password}
      - QUEUE_CONNECTION=database
      - SESSION_EXPIRE_ON_CLOSE=true
      - SESSION_LIFETIME=60
      - FRONTEND_URL=http://deneb.ddns.net
      - ALT_FRONTEND_URL=http://deneb.ddns.net
    depends_on:
      - queue
      - pgbouncer
      - postgres
    restart: unless-stopped
    networks:
      - expense_network
    command: sh -c "DB_HOST=postgres DB_PORT=5432 php artisan migrate --force && rm -rf public/storage && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=8000"
    logging: *default-logging

  # Laravel Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_queue
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/database:/var/www/html/database
    environment:
      - APP_ENV=production
      # SQLite Configuration (Default)
      # - DB_CONNECTION=sqlite
      # - DB_DATABASE=/var/www/html/database/database.sqlite
      # PostgreSQL Configuration (Uncomment to switch)
      - DB_CONNECTION=pgsql
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=${POSTGRES_PASSWORD:-expense_password}
      - QUEUE_CONNECTION=database
    depends_on:
      - pgbouncer
      - postgres
    restart: always
    networks:
      - expense_network
    command: php artisan queue:work --tries=1
    logging: *default-logging

  # React Frontend (Production Build served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: expense_frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - expense_network
    logging: *default-logging

networks:
  expense_network:
    driver: bridge

volumes:
  postgres_data:
