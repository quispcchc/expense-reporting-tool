# Logrotate configuration for Expense App
# Copy to: /etc/logrotate.d/expense-app

# Laravel application logs (already rotated by Laravel daily driver, but compress old ones)
/var/www/expense-app/backend/storage/logs/*.log {
    daily
    missingok
    rotate 90
    compress
    delaycompress
    notifempty
    create 0664 www-data www-data
    dateext
    dateformat -%Y%m%d
    sharedscripts
}

# Supervisor process logs
/var/log/expense-*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 root root
    dateext
    dateformat -%Y%m%d
    copytruncate
}

# Nginx access and error logs for expense app
/var/log/nginx/expense-app-*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}
